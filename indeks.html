<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Emoji Hub - Admin Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --absolute-bg: #0d1117;
            --absolute-card: #161b22;
            --absolute-border: #30363d;
            --absolute-blue: #58a6ff;
            --absolute-green: #238636;
            --absolute-text: #c9d1d9;
            --absolute-gold: #d29922;
        }

        * { box-sizing: border-box; transition: 0.2s ease; }
        body { background-color: var(--absolute-bg); color: var(--absolute-text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        #marquee-container { width: 100%; background: #21262d; border-bottom: 1px solid var(--absolute-border); padding: 12px 0; overflow: hidden; }
        #marquee-text { display: inline-block; padding-left: 100%; animation: scroll 18s linear infinite; color: var(--absolute-blue); font-weight: 600; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        nav { width: 90%; max-width: 1000px; padding: 25px 0; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.5rem; color: white; }

        .glass-panel { background: var(--absolute-card); border: 1px solid var(--absolute-border); border-radius: 12px; padding: 30px; width: 100%; max-width: 450px; text-align: center; margin-top: 40px; }
        
        /* ADMIN PANEL ÖZEL STİLLERİ */
        #admin-panel { display: none; width: 90%; max-width: 800px; background: var(--absolute-card); border: 2px solid var(--absolute-gold); border-radius: 16px; padding: 25px; margin: 20px 0; }
        .admin-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--absolute-border); }
        .user-list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #21262d; font-size: 0.9rem; }
        .user-count { background: var(--absolute-gold); color: black; padding: 2px 8px; border-radius: 10px; font-size: 0.8rem; margin-left: 10px; }

        .feed { width: 90%; max-width: 750px; margin-top: 40px; }
        .story-card { background: var(--absolute-card); border: 1px solid var(--absolute-border); border-radius: 16px; padding: 25px; margin-bottom: 25px; }
        
        button { cursor: pointer; border-radius: 8px; border: 1px solid var(--absolute-border); padding: 12px 24px; font-weight: 600; font-family: inherit; }
        .btn-primary { background: var(--absolute-green); color: white; border: none; }
        .btn-outline { background: transparent; color: var(--absolute-text); }
        .btn-admin-toggle { border-color: var(--absolute-gold); color: var(--absolute-gold); background: transparent; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: var(--absolute-bg); border: 1px solid var(--absolute-border); color: white; border-radius: 8px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="marquee-container"><div id="marquee-text">Absolute Studios: Veritabanı bağlantısı aktif. İyi oyunlar!</div></div>

<nav>
    <div class="logo">ABSOLUTE <span style="color:var(--absolute-blue)">EMOJI</span></div>
    <div id="nav-actions">
        <button id="admin-btn" class="hidden btn-admin-toggle" onclick="toggleAdminPanel()">👑 YÖNETİM</button>
        <button onclick="logout()" class="btn-outline" style="margin-left:10px">Çıkış</button>
    </div>
</nav>

<div id="auth-screen" class="glass-panel">
    <h2>Erişim Sağla</h2>
    <input type="email" id="email" placeholder="E-posta">
    <input type="password" id="pass" placeholder="Şifre">
    <button onclick="handleAuth('login')" class="btn-primary" style="width:100%; margin-top:10px">Giriş Yap</button>
    <button onclick="handleAuth('signup')" class="btn-outline" style="width:100%; margin-top:10px">Kayıt Ol</button>
</div>

<div id="admin-panel">
    <h2 style="color:var(--absolute-gold); margin-top:0;">🛡️ Absolute Kontrol Merkezi</h2>
    
    <div class="admin-section">
        <h3>📢 Global Duyuru Yönetimi</h3>
        <input type="text" id="new-marquee" placeholder="Yeni duyuru metni...">
        <button onclick="updateMarquee()" class="btn-primary">Duyuruyu Güncelle</button>
    </div>

    <div class="admin-section">
        <h3>👥 Kayıtlı Kullanıcılar <span id="user-total" class="user-count">0</span></h3>
        <div id="user-list-container" style="max-height: 200px; overflow-y: auto; background: var(--absolute-bg); border-radius: 8px; padding: 10px; margin-top: 10px;">
            Yükleniyor...
        </div>
    </div>
    
    <button onclick="toggleAdminPanel()" class="btn-outline" style="margin-top:20px; width:100%">Paneli Kapat</button>
</div>

<div id="game-area" class="hidden" style="text-align:center; padding: 40px;">
    <h1>Hoş Geldin, <span id="display-name" style="color:var(--absolute-blue)">Oyuncu</span></h1>
    <button onclick="runScanner()" class="btn-primary" style="font-size: 1.2rem; padding: 15px 45px; border-radius: 50px; margin-top: 20px;">🚀 HİKAYE OLUŞTUR</button>
</div>

<div id="scanner-overlay" class="hidden"></div>
<div id="selector-box" class="hidden"></div>

<div id="story-screen" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(13,17,23,0.98); z-index:3000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <div id="final-emojis" style="font-size:5rem; margin-bottom:20px"></div>
    <textarea id="storyInput" style="max-width:600px; height:200px" placeholder="Hikayeni yaz..."></textarea>
    <div style="margin-top:20px; display:flex; gap:10px">
        <button onclick="saveStory()" class="btn-primary">PAYLAŞ</button>
        <button onclick="location.reload()" class="btn-outline">İPTAL</button>
    </div>
</div>

<div class="feed">
    <h3 style="border-left: 4px solid var(--absolute-blue); padding-left: 15px;">Son Paylaşımlar</h3>
    <div id="story-feed"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, updateDoc, increment, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAK0_OUGrQDQcv-GC38DI2XHfjXkP6mtXE",
        authDomain: "emojihikaye-73ce7.firebaseapp.com",
        projectId: "emojihikaye-73ce7",
        storageBucket: "emojihikaye-73ce7.firebasestorage.app",
        messagingSenderId: "192587902676",
        appId: "1:192587902676:web:5626602357b4a5effa9541"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let isAdmin = false;

    // DURUM TAKİBİ
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            document.getElementById('display-name').innerText = user.email.split('@')[0];
            
            if(user.email === "kuzey@admin.com") {
                isAdmin = true;
                document.getElementById('admin-btn').classList.remove('hidden');
                loadUserList(); // Adminse listeyi yükle
            }
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('game-area').classList.add('hidden');
        }
    });

    // GİRİŞ / KAYIT VE KULLANICIYI VERİTABANINA EKLEME
    window.handleAuth = async (type) => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        try {
            if(type === 'signup') {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                // Yeni kayıt olanı 'users' koleksiyonuna ekle
                await setDoc(doc(db, "users", cred.user.uid), {
                    email: email,
                    joinDate: serverTimestamp()
                });
            } else {
                await signInWithEmailAndPassword(auth, email, pass);
            }
        } catch(e) { alert("Hata: " + e.message); }
    };

    window.logout = () => signOut(auth).then(() => location.reload());

    // ADMİN: KULLANICI LİSTESİNİ ÇEKME
    function loadUserList() {
        onSnapshot(collection(db, "users"), (snap) => {
            const listCont = document.getElementById('user-list-container');
            document.getElementById('user-total').innerText = snap.size;
            listCont.innerHTML = "";
            snap.forEach(userDoc => {
                const userData = userDoc.data();
                const item = document.createElement('div');
                item.className = 'user-list-item';
                item.innerHTML = `<span>📧 ${userData.email}</span> <span style="color:#666; font-size:0.7rem">ID: ${userDoc.id.substring(0,5)}...</span>`;
                listCont.appendChild(item);
            });
        });
    }

    // ADMİN: DUYURU
    window.updateMarquee = async () => {
        const txt = document.getElementById('new-marquee').value;
        await setDoc(doc(db, "settings", "marquee"), { text: txt });
        alert("Sistem duyurusu güncellendi!");
    };

    onSnapshot(doc(db, "settings", "marquee"), (docSnap) => {
        if(docSnap.exists()) document.getElementById('marquee-text').innerText = docSnap.data().text;
    });

    // OYUN VE HİKAYE SİSTEMİ
    let selectedEmojis = "";
    window.runScanner = () => {
        const overlay = document.getElementById('scanner-overlay');
        const box = document.getElementById('selector-box');
        overlay.classList.remove('hidden'); box.classList.remove('hidden');
        overlay.style.display = "grid";
        overlay.innerHTML = "";
        for(let i=0; i<100; i++) {
            let d = document.createElement('div'); d.style.textAlign="center"; d.style.fontSize="2rem"; d.style.opacity="0.1"; d.innerText="🌀"; overlay.appendChild(d);
        }
        const run = setInterval(() => {
            overlay.childNodes.forEach(e => e.innerText = String.fromCodePoint(0x1F600 + Math.floor(Math.random() * 80)));
            box.style.left = Math.random() * (window.innerWidth - 100) + "px";
            box.style.top = Math.random() * (window.innerHeight - 100) + "px";
        }, 80);
        setTimeout(() => {
            clearInterval(run);
            overlay.classList.add('hidden'); box.classList.add('hidden');
            document.getElementById('story-screen').classList.remove('hidden');
            selectedEmojis = "";
            for(let i=0; i<5; i++) selectedEmojis += String.fromCodePoint(0x1F600 + Math.floor(Math.random() * 80)) + " ";
            document.getElementById('final-emojis').innerText = selectedEmojis;
        }, 2000);
    };

    window.saveStory = async () => {
        const content = document.getElementById('storyInput').value;
        if(!content) return;
        await addDoc(collection(db, "stories"), {
            user: currentUser.email, emojis: selectedEmojis, text: content, votes: 0, time: serverTimestamp()
        });
        location.reload();
    };

    onSnapshot(query(collection(db, "stories"), orderBy("time", "desc")), (snap) => {
        const feed = document.getElementById('story-feed');
        feed.innerHTML = "";
        snap.forEach(docSnap => {
            const d = docSnap.data();
            const card = document.createElement('div');
            card.className = 'story-card';
            card.innerHTML = `
                <div style="color:var(--absolute-blue); font-size:0.8rem; font-weight:600; margin-bottom:10px;">@${d.user.split('@')[0].toUpperCase()}</div>
                <div style="font-size:2rem; margin-bottom:15px;">${d.emojis}</div>
                <p>${d.text}</p>
                <div style="display:flex; justify-content:space-between; margin-top:15px;">
                    <button class="btn-outline" style="border-radius:20px; padding:5px 15px;" onclick="vote('${docSnap.id}')">❤️ ${d.votes || 0}</button>
                    ${isAdmin ? `<button onclick="deleteStory('${docSnap.id}')" style="color:#f85149; border:none; background:none;">SİL</button>` : ""}
                </div>
            `;
            feed.appendChild(card);
        });
    });

    window.vote = async (id) => { await updateDoc(doc(db, "stories", id), { votes: increment(1) }); };
    window.deleteStory = async (id) => { if(confirm("Silinsin mi?")) await deleteDoc(doc(db, "stories", id)); };
    window.toggleAdminPanel = () => {
        const p = document.getElementById('admin-panel');
        p.style.display = p.style.display === "block" ? "none" : "block";
    };
</script>
</body>
</html>
